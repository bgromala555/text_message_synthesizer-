[mypy]
# Python version
# Target Python version for type checking; affects available syntax and stdlib types
python_version = 3.12

# Import discovery
# Directory or files to type check; mypy will recursively check all .py files here
files = source/, tests/
# Enable PEP 420 namespace packages (packages without __init__.py)
namespace_packages = True
# Require packages to be explicitly listed; helps with import resolution
explicit_package_bases = True

# Strictness options
# Type check the body of functions even if they lack type annotations
check_untyped_defs = True
# Forbid using generic types like List without type parameters (must use List[int], not List)
disallow_any_generics = True
# Require all function parameters and return values to be annotated if any are
disallow_incomplete_defs = True
# Forbid subclassing a value of type Any (catches missing stubs issues)
disallow_subclassing_any = True
# Allow calling functions without type annotations from typed functions
disallow_untyped_calls = False
# Allow decorators without type annotations on typed functions
disallow_untyped_decorators = False
# Allow function definitions without complete type annotations
disallow_untyped_defs = False
# Don't treat arguments with None default as Optional; must explicitly use Optional[X]
no_implicit_optional = True
# Only re-export symbols if they're explicitly listed in __all__ or imported with "as"
no_implicit_reexport = True
# Warn when comparing types that are incompatible (e.g., str == int always False)
strict_equality = True
# Warn when a cast() call is unnecessary because the type is already correct
warn_redundant_casts = True
# Don't warn when returning Any from a function with a typed return value
warn_return_any = False
# Warn if a [mypy-*] section doesn't match any files
warn_unused_configs = True
# Don't warn when # type: ignore comments are unnecessary
warn_unused_ignores = False
# Forbid explicit Any type annotations; forces more precise typing
#disallow_any_explicit = True

# Error output
# Display error codes like [arg-type] in error messages for easier suppression
show_error_codes = True
# Show additional context lines around errors for better understanding
show_error_context = True
# Use prettier, more readable error output with colors and formatting
pretty = True

# Incremental mode
# Enable incremental mode; reuses cached analysis for faster subsequent runs
incremental = True
# Directory to store the incremental analysis cache
cache_dir = .mypy_cache

# Pydantic plugin for proper type inference with Pydantic models
plugins = pydantic.mypy

# Third-party libraries without type stubs
# Configuration override for sentence_transformers package
# Suppress errors about missing type stubs for this package
[mypy-sentence_transformers.*]
ignore_missing_imports = True

# Configuration override for pgvector package
# Suppress errors about missing type stubs for this package
[mypy-pgvector.*]
ignore_missing_imports = True

# Configuration override for tqdm progress bar package
# Suppress errors about missing type stubs for this package
[mypy-tqdm.*]
ignore_missing_imports = True

# Configuration override for psycopg (PostgreSQL adapter) package
# Suppress errors about missing type stubs for this package
[mypy-psycopg.*]
ignore_missing_imports = True

# Configuration override for psycopg connection pooling package
# Suppress errors about missing type stubs for this package
[mypy-psycopg_pool.*]
ignore_missing_imports = True
disallow_any_generics = True
disallow_any_explicit = True

# Configuration override for dateutil package
# Suppress errors about missing type stubs for this package
[mypy-dateutil.*]
ignore_missing_imports = True

# Configuration override for pytest_mock package
# Suppress errors about missing type stubs for this package
[mypy-pytest_mock.*]
ignore_missing_imports = True

# Configuration override for pytest package
# Suppress errors about missing type stubs for this package
[mypy-pytest.*]
ignore_missing_imports = True

# Configuration override for celery package
# Suppress errors about missing type stubs for this package
[mypy-celery.*]
ignore_missing_imports = True
