# Ruff configuration for code formatting and linting
# See: https://docs.astral.sh/ruff/
# Rules: https://docs.astral.sh/ruff/rules/#pydocstyle-d

extend-exclude = ["app/hybrid.py"]
# Line length matching project standards
line-length = 140

# Target Python 3.12+
target-version = "py312"

[lint]
# Enable these rule sets
select = [
    "ASYNC", # Asyncio
    "C90",   # Code complexity
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "DOC",   # Docstrings
    "D",     # Docstrings
    "F",     # pyflakes
    "FAST",  # FastAPI
    "I",     # isort (import sorting)
    "N",     # pep8-naming
    "UP",    # pyupgrade (modern Python syntax)
    "B",     # flake8-bugbear
    "A",     # flake8-builtins
    "C4",    # flake8-comprehensions
    "DTZ",   # flake8-datetimez
    "ISC",   # flake8-implicit-str-concat
    "ICN",   # flake8-import-conventions
    "G",     # flake8-logging-format
    "PIE",   # flake8-pie
    "PYI",   # flake8-pyi
    "Q",     # flake8-quotes
    "RET",   # flake8-return
    "SIM",   # flake8-simplify
    "S",     # Bandit
    "TID",   # flake8-tidy-imports
    "TC",   # flake8-type-checking
    "ARG",   # flake8-unused-arguments
    "PT",    # Pytest styles
    "PTH",   # flake8-use-pathlib
    "ERA",   # eradicate (commented out code)
    "PL",    # pylint
    #"PLR",   # Refactor (PLR)
    "RUF",   # Ruff-specific rules
]

# Ignore specific rules that conflict with project style
ignore = [
    "E501",    # Line too long (handled by formatter)
    "ARG001",  # Unused function argument
    #"F401",   # unused imports
    "D205",    # Note: just keep this one activate
    "D203",    # Note: Just keep this one active
    "D213",    # Note: Just keep this one active
    "PLR0913", # Too many arguments
    "PLW0603", # Ban global variables
    "G004",    # Logging uses f string
    #"I001",    # require sorted imports
    "PLR0917", # Too many positional arguments
    #"PLR0915",# Too many statements
    "PLR0914", # Too many local variables
    #"ISC001",  # Conflicts with formatter
    "PLR0912", # Too many Branches
    #"B008",    # Function calls in argument defaults (FastAPI Depends pattern)
    "TC001",   # Move app imports to TYPE_CHECKING (breaks runtime)
    "TC002",   # Move third-party imports to TYPE_CHECKING (breaks runtime)
    "TC003",   # Move stdlib imports to TYPE_CHECKING (breaks runtime)
    "ERA001",   # Commented out code
    #"C901",    # Code too complex
]

# Allow unused variables when prefixed with underscore
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
# This is a customization we like because the default is too strict
"__init__.py" = ["F401"]  # Allow unused imports in __init__.py
"tests/**/*.py" = [
    "PLR6301",  # Method could be a function/static - pytest test methods use self idiomatically
    "PLR2004",  # Magic value used in comparison - test assertions commonly use literal values
    "ARG002",   # Unused method argument - fixtures may be needed for side effects
]

[lint.pylint]
# Increase max statements from default 50
# This is a customization we like because the default is too strict
max-statements = 60

[lint.mccabe]
# Increase max complexity from default 10
# This is a customization we like because the default is too strict
max-complexity = 16

[lint.isort]
# Import organization matching project standards
known-first-party = ["app"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[lint.flake8-type-checking]
# Enforce type checking imports in TYPE_CHECKING blocks
strict = true

[format]
# Use double quotes for strings
quote-style = "double"

# Use spaces for indentation
indent-style = "space"

# Line endings
line-ending = "auto"

# Skip magic trailing comma for single-element collections
skip-magic-trailing-comma = false

